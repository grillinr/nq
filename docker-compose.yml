version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - RUST_LOG=info
      - DATABASE_URL=sqlite:/app/data/app.db
    depends_on:
      - database
    networks:
      - nq-network
    restart: unless-stopped

  # SQLite Database (using a lightweight SQLite container)
  database:
    image: alpine:latest
    command: sh -c "apk add --no-cache sqlite && mkdir -p /data && sqlite3 /data/app.db < /schema/data_def.sql && tail -f /dev/null"
    volumes:
      - ./backend/data_def.sql:/schema/data_def.sql:ro
      - backend_data:/data
    networks:
      - nq-network
    restart: unless-stopped

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "19006:19006"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - nq-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nq-network
    restart: unless-stopped

volumes:
  backend_data:

networks:
  nq-network:
    driver: bridge

